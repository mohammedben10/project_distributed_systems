<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Leaves - Smart Agriculture</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        
        #bg-video {
            position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%;
            z-index: -1; filter: brightness(0.4);
        }
        
        .hero-content {
            height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: white; padding: 20px;
        }
        
       .hero-title {
            font-family: 'Merriweather', serif;
            font-size: 5rem; 
            font-weight: 900;
            letter-spacing: -2px;
            color: white;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 0.5rem;
        }
        .hero-subtitle {
            font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.9; margin-bottom: 2rem;
        }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="{% static 'videos/background.mp4' %}" type="video/mp4">
    </video>

    <div class="hero-content">
        <h1 class="hero-title">My Leaves</h1>
        <p class="hero-subtitle">Smart Disease Detection</p>
        
        <p class="lead mb-5 fs-4 text-light opacity-75" style="max-width: 700px;">
            Advanced Deep Learning for Real-Time Plant Diagnostics.
            <br>Secure your harvest with intelligent AI.
        </p>
        
        <div class="d-flex gap-3">
            <a href="{% url 'login' %}" class="btn btn-light btn-lg px-5 py-3 rounded-pill fw-bold">Login</a>
            <a href="{% url 'signup' %}" class="btn btn-outline-light btn-lg px-5 py-3 rounded-pill fw-bold">Sign Up</a>
        </div>
    </div>

</body>
</html>
