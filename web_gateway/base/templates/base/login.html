<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - My Leaves</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-image: url("{% static 'images/signupimage.jpg' %}");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(20, 60, 20, 0.6), rgba(40, 90, 40, 0.4));
            backdrop-filter: blur(5px);
            z-index: 1;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 20px;
            padding: 40px 50px;
            width: 100%; max-width: 450px;
            position: relative; z-index: 10;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            animation: fadeIn Up 0.8s ease-out;
        }

        /* BRAND LOGO STYLE */
        .brand-header {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-bottom: 20px;
        }
        .brand-text {
            font-family: 'Merriweather', serif;
            font-weight: 900;
            color: #2e7d32;
            font-size: 2rem;
            letter-spacing: -1px;
        }
        .brand-icon {
            font-size: 2rem; color: #43a047;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
        }

        .input-group-text { background: #f1f8e9; border: 1px solid #ced4da; border-right: none; color: #2e7d32; }
        .form-control { border-left: none; background: #f8f9fa; padding: 12px; transition: all 0.3s; }
        .form-control:focus { background: white; box-shadow: none; border-color: #81c784; }
        .input-group .form-control:focus { z-index: 0; }

        .btn-farm {
            background: linear-gradient(90deg, #2e7d32, #43a047);
            border: none; color: white; padding: 12px; font-weight: 600;
            letter-spacing: 0.5px; transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-farm:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(46, 125, 50, 0.4); color: white; }
        .text-green { color: #2e7d32; }
        .hover-underline:hover { text-decoration: underline !important; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="login-card">
        
        <div class="brand-header">
            <i class="fas fa-leaf brand-icon"></i>
            <span class="brand-text">My Leaves</span>
        </div>

        <p class="text-muted small mb-4">Access your Smart Farm Dashboard</p>

        {% if form.errors %}
        <div class="alert alert-danger py-2 small shadow-sm border-0">
            <i class="fas fa-exclamation-circle me-2"></i> Incorrect username or password.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3 text-start">
                <label class="small fw-bold text-muted text-uppercase ms-1">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    {{ form.username }}
                </div>
            </div>
            <div class="mb-4 text-start">
                <label class="small fw-bold text-muted text-uppercase ms-1">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    {{ form.password }}
                </div>
            </div>
            <button type="submit" class="btn btn-farm w-100 rounded-pill shadow-sm">LOG IN</button>
        </form>

        <div class="mt-4 pt-3 border-top">
            <p class="text-muted small mb-0">New farmer? <a href="{% url 'signup' %}" class="text-green fw-bold text-decoration-none hover-underline">Create Account</a></p>
        </div>
    </div>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var inputs = document.querySelectorAll('input');
            inputs.forEach(function(input) {
                input.classList.add('form-control');
                input.placeholder = "Enter your " + input.name;
            });
        });
    </script>
</body>
</html>
