<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    body {
    background-image: url("{% static 'images/signupimage.jpg' %}");
    background-size: cover;      
    background-position: center; 
    background-repeat: no-repeat;
    background-attachment: fixed; 
}
</style>
<body class="bg-light">

  <div class="content_reg shadow-lg p-5">
    <a href="{%url 'home'%}" class="text-decoration-none text-dark">
        <img src="{% static 'images/logo.png' %}" 
       alt="App Logo" 
       style="width:120px;" 
       class="img-fluid">
    </a>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p}}
      
      <div class="d-flex justify-content-center gap-3 mt-4">
        <button type="submit" class="btn btn-dark btn-lg flex-fill">Log in</button>
      </div>
    </form>

    <p class="mt-3 text-center">
      Don’t have an account?
      <a href="{% url 'signup' %}">Sign up here</a>
    </p>

  </div>

</body>
</html>
