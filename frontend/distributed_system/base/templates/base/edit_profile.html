<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Profile</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  <style>

    body.profile-page {
      background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
    }

    @keyframes gradientBG {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .profile-card {
      width: 100%;
      max-width: 600px;
      
      background: rgba(255, 255, 255, 0.85);
    
      backdrop-filter: blur(12px);
      
      -webkit-backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      border: 1px solid rgba(255, 255, 255, 0.4);
      margin: auto;
    }

    .profile-title {
      font-weight: 700;
      color: #333;
    }

    .avatar-wrapper {
      position: relative;
      display: inline-block;
      padding: 4px;
      background: linear-gradient(45deg, #667eea, #764ba2);
      border-radius: 50%;
    }

    .avatar-preview {
      width: 120px;
      
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #fff;
      background-color: #fff;
      display: block;
    }

    .form-floating>.form-control {
      border-radius: 12px;
      border: 2px solid #eaecf0;
      background-color: #f9fafb;
    }

    .form-floating>.form-control:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .save-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      padding: 14px;
      font-weight: 600;
      border-radius: 12px;
      transition: transform 0.2s;
    }

    .save-btn:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
    }
  </style>
</head>

<body class="profile-page">
  <div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
    <div class="profile-card">
      <div class="text-center mb-4">
        <h2 class="profile-title">Edit Profile</h2>
        <p class="text-muted small">Update your personal details below</p>
      </div>

      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        
        <div class="avatar-section text-center mb-4">
          <div class="avatar-wrapper">
            <img src="{{ request.user.profile.avatar.url }}" class="avatar-preview" alt="Current Avatar" />
          </div>
        </div>

       
        <div class="mb-4">
          <div class="form-floating mb-3">
            {{ user_form.username }}
            <label>Username</label>
          </div>
          <div class="form-floating mb-3">
            {{ user_form.last_name }}
            <label>Last Name</label>
          </div>
          <div class="form-floating mb-3">
            {{ user_form.email }}
            <label>Email Address</label>
          </div>
        </div>

        <div class="divider my-4"></div>

        
        <div class="mb-4">
          <div class="mb-3">
            <label class="form-label fw-bold ms-1 text-secondary">New Profile Picture</label>
            {{ profile_form.avatar }}
          </div>

          <div class="form-floating mb-3">
            {{ profile_form.pay }}
            <label>Country (Pay)</label>
          </div>

          <div class="form-floating mb-3">
            {{ profile_form.ville }}
            <label>City (Ville)</label>
          </div>
        </div>

        <div class="d-grid mt-4">
          <button class="btn btn-primary save-btn" type="submit">
            Save Changes
          </button>
        </div>
      </form>
    </div>
  </div>

</body>

</html>
