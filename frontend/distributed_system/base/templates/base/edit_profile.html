<!DOCTYPE html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit_Profile</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f4f6fa;
      }
      .profile-card {
        max-width: 700px;
        margin: 60px auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      }
      .avatar-preview {
        width: 130px;
        height: 130px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid #e3e3e3;
      }
      .save-btn {
        width: 100%;
        padding: 12px;
        font-size: 18px;
      }
      .title {
        font-weight: 700;
      }

    </style>
  </head>

  <body>
    <div class="profile-card">
      <h3 class="text-center mb-4 title">Edit Your Profile</h3>

      <!-- Avatar Section -->
      <div class="text-center mb-4">
        <img
          src="{{ request.user.profile.avatar.url }}"
          class="avatar-preview"
          alt="Current Avatar"
        />
      </div>

      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <h5 class="mt-3 mb-2">Account Information</h5>
        <hr />

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Username</label>
            {{ user_form.username}}
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Last Name</label>
            {{ user_form.last_name }}
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          {{ user_form.email}}
        </div>

        <h5 class="mt-4 mb-2">Profile Details</h5>
        <hr />

        <div class="mb-3">
          <label class="form-label">Avatar</label>
          {{ profile_form.avatar}}
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Country (Pay)</label>
            {{ profile_form.pay}}
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">City (Ville)</label>
            {{ profile_form.ville}}
          </div>
        </div>

        <button class="btn btn-primary save-btn mt-3" type="submit">
          Save Changes
        </button>
      </form>
    </div>
  </body>
</html>
